name: Team or admin work
description: Team tasks, onboarding, induction, tooling or governance work.
title: "[Team/Admin]: "
labels: ["workstream: team-admin"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Task summary
      description: What needs doing?
    validations:
      required: true

  - type: dropdown
    id: work_type
    attributes:
      label: Work type
      options:
        - Task
        - Decision
        - Risk
        - Governance
        - Onboarding
        - Tooling
    validations:
      required: true

  - type: dropdown
    id: theme
    attributes:
      label: Theme
      options:
        - Team tasks
        - Content Management & Governance
        - Accessibility & user experience
        - Resources for professionals
        - Understanding the Justice System
        - Navigating the Justice System
        - Support for affected individuals & families
    validations:
      required: true

  - type: input
    id: initiative
    attributes:
      label: Initiative
      placeholder: e.g. Onboarding & induction, Tooling, Performance & analytics
    validations:
      required: true

  - type: dropdown
    id: moscow
    attributes:
      label: MoSCoW priority
      options:
        - Must Have
        - Should Have
        - Could Have
        - Won't Have for now
    validations:
      required: true

  - type: dropdown
    id: tshirt_size
    attributes:
      label: T-shirt size
      description: XS <1 hour; S 1-5 hours; M 10-15 hours/1-2 days; L up to 1 week; XL more than 1 week.
      options:
        - XS - less than 1 hour
        - S - 1 to 5 hours
        - M - 10 to 15 hours / 1 to 2 days
        - L - up to 1 week
        - XL - more than 1 week
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] 
        - [ ] 
        - [ ] 
    validations:
      required: true

  - type: textarea
    id: done
    attributes:
      label: Definition of Done
      value: |
        - [ ] All acceptance criteria are met
        - [ ] Peer-reviewed or checked where needed
        - [ ] Supporting documentation updated
        - [ ] Relevant people informed
        - [ ] Moved to Done
