name: Technical work
description: Development, Drupal, infrastructure, bug, spike or tech debt.
title: "[Tech]: "
labels: ["workstream: tech"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Technical task summary
      description: What needs to be built, fixed, configured or investigated?
    validations:
      required: true

  - type: dropdown
    id: work_type
    attributes:
      label: Work type
      options:
        - Task
        - Story
        - Spike
        - Bug
        - Tech debt
        - Epic
        - Decision
        - Risk
    validations:
      required: true

  - type: dropdown
    id: theme
    attributes:
      label: Theme
      options:
        - Understanding the Justice System
        - Navigating the Justice System
        - Support for affected individuals & families
        - Resources for professionals
        - Accessibility & user experience
        - Content Management & Governance
        - Team tasks
    validations:
      required: true

  - type: input
    id: initiative
    attributes:
      label: Initiative
      placeholder: e.g. Search & IA, Workflow & QA, Tooling
    validations:
      required: true

  - type: dropdown
    id: moscow
    attributes:
      label: MoSCoW priority
      options:
        - Must Have
        - Should Have
        - Could Have
        - Won't Have for now
    validations:
      required: true

  - type: dropdown
    id: tshirt_size
    attributes:
      label: T-shirt size
      description: XS <1 hour; S 1-5 hours; M 10-15 hours/1-2 days; L up to 1 week; XL more than 1 week.
      options:
        - XS - less than 1 hour
        - S - 1 to 5 hours
        - M - 10 to 15 hours / 1 to 2 days
        - L - up to 1 week
        - XL - more than 1 week
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Local / Beta / Staging / Live / GitHub / Cloudflare / Server

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] 
        - [ ] 
        - [ ] 
    validations:
      required: true

  - type: textarea
    id: risks
    attributes:
      label: Risks or dependencies
      description: Include blockers, dependencies, security considerations or known constraints.

  - type: textarea
    id: done
    attributes:
      label: Technical Definition of Done
      value: |
        - [ ] Code is written, committed and pushed to the correct branch
        - [ ] Peer-reviewed
        - [ ] Unit and integration tests written and passing where appropriate
        - [ ] Tested in staging or test environment
        - [ ] No critical bugs or regressions
        - [ ] Feature deployed or change implemented
        - [ ] Documentation updated
