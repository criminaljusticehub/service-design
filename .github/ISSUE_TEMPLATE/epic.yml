name: Epic
description: A larger body of work linked to a CJH theme and initiative.
title: "[Epic]: "
labels: ["type: epic"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for larger pieces of work that may contain multiple stories or tasks.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is this epic about?
    validations:
      required: true

  - type: dropdown
    id: theme
    attributes:
      label: Theme
      options:
        - Understanding the Justice System
        - Navigating the Justice System
        - Support for affected individuals & families
        - Resources for professionals
        - Accessibility & user experience
        - Content Management & Governance
        - Team tasks
    validations:
      required: true

  - type: input
    id: initiative
    attributes:
      label: Initiative
      description: Which initiative does this support?
      placeholder: e.g. Guidance & forms, Search & IA, Resource accessibility
    validations:
      required: true

  - type: textarea
    id: user_need
    attributes:
      label: User need / problem
      description: What user need, organisational goal, risk or opportunity does this address?
    validations:
      required: true

  - type: textarea
    id: outcomes
    attributes:
      label: Desired outcomes
      description: What should be true when this epic is complete?
    validations:
      required: true

  - type: dropdown
    id: moscow
    attributes:
      label: MoSCoW priority
      options:
        - Must Have
        - Should Have
        - Could Have
        - Won't Have for now
    validations:
      required: true

  - type: dropdown
    id: tshirt_size
    attributes:
      label: T-shirt size
      description: XS <1 hour; S 1-5 hours; M 10-15 hours/1-2 days; L up to 1 week; XL more than 1 week.
      options:
        - XS - less than 1 hour
        - S - 1 to 5 hours
        - M - 10 to 15 hours / 1 to 2 days
        - L - up to 1 week
        - XL - more than 1 week
    validations:
      required: true

  - type: textarea
    id: success_measures
    attributes:
      label: Success measures
      description: How will we know this has worked?

  - type: textarea
    id: risks
    attributes:
      label: Risks, dependencies or constraints
      description: Include legal, technical, operational, volunteer capacity or launch risks.

  - type: textarea
    id: related
    attributes:
      label: Related issues, documents or evidence
      description: Add links to research, designs, documents, decisions or related tasks.
